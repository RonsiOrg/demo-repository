name: Convert Markdown to PDF

on:
  push:
    tags:
      - '*'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pandoc e LaTeX (per il rendering PDF)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-latex-recommended

      - name: Convert Markdown to PDF
        run: |
          pandoc README.md -o output.pdf --pdf-engine=xelatex

      - name: Upload PDF as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: output.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
